name: Refresh Substack Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ingest Substack notes and posts
        run: node scripts/ingest_substack_notes.mjs
        shell: bash

      - name: Commit refreshed data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh substack feed"
          file_pattern: content/substack/data/feed.json
